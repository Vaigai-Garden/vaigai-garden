<style>
:root {
  --green:#3a8c2f;
  --green-l:#4caf3e;
  --gold:#f0a830;
  --cream:#fdf6e8;
  --dark:#1c1008;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Nunito',sans-serif;
  background:var(--cream);
  color:var(--dark);
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;
  background:#fff;
  height:70px;
  display:flex;justify-content:space-between;
  align-items:center;
  padding:0 20px;
  box-shadow:0 2px 15px rgba(0,0,0,0.1);
  z-index:100;
}
nav img{height:60px;}
.nav-links a{
  margin-left:20px;
  text-decoration:none;
  font-weight:800;
  color:#000;
}
.nav-links a:hover{color:var(--green);}

/* HERO */
.gallery-hero{
  margin-top:70px;
  padding:100px 20px 60px;
  text-align:center;
  background:linear-gradient(160deg,#1c3a10,#2d6020);
  color:#fff;
}
.gallery-hero h1{
  font-family:'Playfair Display';
  font-size:3.5rem;
}
.gallery-hero p{opacity:.9;}

/* GRID */
.gallery{
  padding:60px 20px;
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:18px;
  cursor:pointer;
  transition:0.3s;
}
.gallery img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.lightbox img{
  max-width:90%;
  max-height:85%;
  border-radius:10px;
}
.lightbox:target{
  display:flex;
}

/* FOOTER */
footer{
  background:#1c3a10;
  color:#fff;
  text-align:center;
  padding:40px 20px;
  margin-top:40px;
}

/* WHATSAPP BUTTON */
.wa-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:14px 20px;
  border-radius:50px;
  text-decoration:none;
  font-weight:800;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
}
</style>
</head>
